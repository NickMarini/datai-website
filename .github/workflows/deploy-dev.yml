name: Deploy Dev

on:
  # Manual-only — dev is never deployed automatically
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  dev_infra_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Run Terraform (Dev Workspace)
        working-directory: ./terraform
        run: |
          terraform init
          terraform workspace select dev || terraform workspace new dev
          terraform apply -auto-approve \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="region=${{ vars.GCP_REGION }}"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Frontend to Dev Site
        run: |
          firebase deploy --only hosting --site datai-portfolio-dev --project ${{ vars.GCP_PROJECT_ID }}
name: Deploy Prod

on:
  # Auto-deploy prod on every push to main
  #push:
  #  branches:
  #    - main
  # Also runnable manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  prod_infra_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Run Terraform (Prod Workspace)
        working-directory: ./terraform
        run: |
          terraform init
          terraform workspace select prod || terraform workspace new prod
          terraform apply -auto-approve \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="region=${{ vars.GCP_REGION }}"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Frontend to Prod Site
        run: |
          firebase deploy --only hosting:prod --project ${{ vars.GCP_PROJECT_ID }}